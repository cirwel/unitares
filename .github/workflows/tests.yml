name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

# Least-privilege default for GITHUB_TOKEN: every job here only reads the repo
# and runs tests (checkout, pip/npm install, pytest/vitest, artifact upload) —
# none push, comment, or release. Pins the token to read-only (CodeQL finding).
permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        # Don't persist GITHUB_TOKEN as a git credential, otherwise pip's
        # `git clone` of unitares-core (or any other public repo) sends it
        # as a 401-eliciting auth header and falls back to a no-TTY prompt.
        persist-credentials: false

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-full.txt

    - name: Validate CI/Python version sync
      run: |
        python scripts/dev/check_ci_python_version_sync.py

    - name: Validate CI matrix matches pyproject requires-python
      run: |
        python scripts/diagnostics/check_ci_python_matrix_sync.py

    - name: Check doc drift
      run: |
        python scripts/diagnostics/check_doc_drift.py

    - name: Dead-code gate (unused imports)
      run: |
        pip install "ruff>=0.15"
        ruff check .

    - name: Run smoke tests
      run: |
        make test-smoke

  test:
    runs-on: ubuntu-latest
    needs: smoke

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        # Don't persist GITHUB_TOKEN as a git credential, otherwise pip's
        # `git clone` of unitares-core (or any other public repo) sends it
        # as a 401-eliciting auth header and falls back to a no-TTY prompt.
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-full.txt

    - name: Validate CI/Python version sync
      run: |
        python scripts/dev/check_ci_python_version_sync.py

    - name: Validate CI matrix matches pyproject requires-python
      run: |
        python scripts/diagnostics/check_ci_python_matrix_sync.py

    - name: Check doc drift
      run: |
        python scripts/diagnostics/check_doc_drift.py

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ agents/ -v \
          --cov=src --cov=agents/sdk/src/unitares_sdk --cov=agents \
          --cov-report=term-missing --cov-report=html --cov-fail-under=75

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

    - name: Run tool count validation
      continue-on-error: true
      run: |
        python scripts/analysis/count_tools.py --json

  dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dashboard deps
      working-directory: dashboard
      run: npm ci

    - name: Lint
      working-directory: dashboard
      run: npm run lint

    - name: Check formatting
      working-directory: dashboard
      run: npm run format:check

    - name: Run dashboard frontend tests
      working-directory: dashboard
      run: npm test

    - name: Build (verify the bundle compiles)
      working-directory: dashboard
      run: npm run build
