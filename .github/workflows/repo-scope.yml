name: Repo Scope Guard

# Keeps the user/agent-agnostic repo free of operator-personal material, career
# artifacts, and per-vendor agent config. This is the layer that catches cloud /
# web agent sessions, which bypass the local pre-commit hook. See docs/REPO_SCOPE.md.

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main, develop ]

jobs:
  scope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff base)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && \
               git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run repo scope guard
        run: bash scripts/dev/check-repo-scope.sh --base "${{ steps.base.outputs.ref }}"

      # The file guard checks committed content; a PR description is not a file,
      # so lint it separately for the same chat-session register. Body passed via
      # env (never inlined) to avoid script injection.
      - name: Lint PR body for chat-session register
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Escape hatch for PRs that legitimately discuss these patterns (this
          # guard, register cleanups, meta-docs): add the HTML comment
          # <!-- scope-guard: allow-register --> to the PR body. Rare by design.
          if printf '%s' "$PR_BODY" | grep -q 'scope-guard: allow-register'; then
            echo "PR body register: allow-register marker present — skipping."
            exit 0
          fi
          bad=$(printf '%s' "$PR_BODY" | grep -niE '/Users/cirwel|per your guidance|your overlay|you flagged|questions for [Kk]enny|live-verifier|council pass|council fold|claude\.ai/code/session|Claude-Session:' || true)
          if [ -n "$bad" ]; then
            echo "::error::PR body reads like a personal chat session, leaks an operator-local path, or carries a Claude session-attribution link. Rewrite third-person/imperative; move working notes out of the public record."
            printf '%s\n' "$bad"
            exit 1
          fi
          echo "PR body register: clean"

      # Commit messages aren't files or the PR body, so check them too — the
      # Claude Code session-attribution trailer (Claude-Session: claude.ai/code/session)
      # lands there by default and should not enter the public history.
      - name: Lint PR commit messages for session-attribution links
        if: github.event_name == 'pull_request'
        run: |
          base="${{ steps.base.outputs.ref }}"
          bad=$(git log "${base}..HEAD" --format='%H %s%n%b' | grep -niE 'claude\.ai/code/session|Claude-Session:' || true)
          if [ -n "$bad" ]; then
            echo "::error::A PR commit message carries a Claude Code session link (claude.ai/code/session). Strip the Claude-Session trailer from commit messages."
            printf '%s\n' "$bad"
            exit 1
          fi
          echo "Commit messages: clean"
