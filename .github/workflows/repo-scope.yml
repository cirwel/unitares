name: Repo Scope Guard

# Keeps the user/agent-agnostic repo free of operator-personal material, career
# artifacts, and per-vendor agent config. This is the layer that catches cloud /
# web agent sessions, which bypass the local pre-commit hook. See docs/REPO_SCOPE.md.

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main, develop ]

jobs:
  scope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff base)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && \
               git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run repo scope guard
        run: bash scripts/dev/check-repo-scope.sh --base "${{ steps.base.outputs.ref }}"
