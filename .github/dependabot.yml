version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      runtime-deps:
        patterns:
          - "mcp"
          - "numpy"
          - "uvicorn"
          - "starlette"
          - "websockets"
          - "asyncpg"
          - "redis"
          - "orjson"
          - "aiofiles"
          - "psutil"
          - "prometheus-client"
          - "requests"
          - "python-dotenv"
          - "sentence-transformers"
        update-types:
          - "minor"
          - "patch"
      dev-deps:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "scipy"
          - "matplotlib"
          - "editdistance"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    # Root compose/Dockerfile + the AGE+pgvector image. Pinned base tags here
    # (apache/age, pgvector) get bump PRs instead of silently floating; the
    # Docker Quickstart workflow validates each bump end to end before merge.
    directories:
      - "/"
      - "/db/postgres"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "ci"
