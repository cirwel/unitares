<!doctype html>
<html lang="en" data-theme="ink">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UNITARES · Governance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./tokens.css" />
<link rel="stylesheet" href="./kit.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .live-pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono);
    font-size: var(--text-xs); color: var(--muted); }
  .live-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok);
    animation: live-pulse 2s var(--ease) infinite; }
  .live-pill.paused .dot { background: var(--faint); animation: none; }
  @keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

  /* Adjudication section */
  .adj-top { display: flex; align-items: baseline; gap: var(--space-3); }
  .adj-top .pending { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); }
  .adj-blurb { color: var(--muted); font-size: var(--text-sm); max-width: 62ch; }
  .adj-progress { display: flex; flex-wrap: wrap; gap: var(--space-4); align-items: baseline;
    font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted);
    padding: var(--space-3) 0; border-bottom: 1px solid var(--line); margin-bottom: var(--space-4); }
  .adj-progress .stat b { color: var(--ink-2); font-weight: 500; }
  .adj-progress .stat.ok b { color: var(--ok); }
  .adj-progress .hint { flex-basis: 100%; color: var(--faint); }
  .adj-token-hint { background: color-mix(in srgb, var(--warn) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--warn) 30%, transparent);
    border-radius: var(--radius-sm); padding: var(--space-3); font-size: var(--text-sm);
    margin-bottom: var(--space-4); }
  .adj-card { border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: var(--space-4); margin-bottom: var(--space-3); background: var(--surface-2);
    transition: opacity 0.4s var(--ease); }
  .adj-card.done { opacity: 0.35; }
  .adj-head { display: flex; gap: var(--space-3); align-items: baseline;
    font-family: var(--font-mono); font-size: var(--text-xs); margin-bottom: var(--space-2); }
  .adj-head .sev { padding: 1px 6px; border-radius: var(--radius-sm); }
  .adj-head .sev-critical { color: var(--bad, #d33); background: color-mix(in srgb, var(--bad, #d33) 12%, transparent); }
  .adj-head .sev-high { color: var(--warn); background: color-mix(in srgb, var(--warn) 12%, transparent); }
  .adj-head .type { color: var(--muted); }
  .adj-head .when { color: var(--faint); margin-left: auto; }
  .adj-msg { font-size: var(--text-sm); margin-bottom: var(--space-3); word-break: break-word; }
  .adj-actions { display: flex; flex-wrap: wrap; gap: var(--space-2); align-items: center; }
  .adj-actions .btn { font: inherit; font-size: var(--text-xs); padding: 4px 10px;
    border: 1px solid var(--line-2); border-radius: var(--radius-sm); background: var(--surface);
    color: var(--ink-2); cursor: pointer; }
  .adj-actions .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .adj-actions .btn:disabled { opacity: 0.5; cursor: default; }
  .adj-actions .btn.confirm:hover:not(:disabled) { border-color: var(--ok); color: var(--ok); }
  .adj-actions .btn.fp:hover:not(:disabled) { border-color: var(--warn); color: var(--warn); }
  .adj-actions .dismiss-group { display: inline-flex; gap: var(--space-2); align-items: center; margin-left: auto; }
  .adj-actions select.reason { font: inherit; font-size: var(--text-xs); padding: 3px 6px;
    border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface); color: var(--muted); }
  .adj-note { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); margin-top: var(--space-2); }
  .adj-empty { color: var(--muted); font-size: var(--text-sm); padding: var(--space-5) 0; }
</style>
</head>
<body>
<div class="wrap">

  <header class="topbar">
    <span class="brand">UNITARES<span class="dot">.</span></span>
    <span class="brand-sub">Governance</span>
    <span class="spring"></span>
    <span class="server-stat" id="serverStat">—</span>
    <span class="live-pill" id="livePill" title="Auto-refreshing monitor views"><span class="dot"></span><span id="liveText">live</span></span>
    <button class="theme-toggle" id="themeBtn">◑ paper</button>
  </header>

  <nav class="nav" id="nav">
    <a href="#overview" class="active" data-section="overview">Overview</a>
    <a href="#agents" data-section="agents">Agents</a>
    <a href="#discoveries" data-section="discoveries">Discoveries</a>
    <a href="#dialectic" data-section="dialectic">Dialectic</a>
    <a href="#activity" data-section="activity">Activity</a>
    <a href="#eisv" data-section="eisv">EISV</a>
    <a href="#research" data-section="research">Research</a>
    <a href="#metrics" data-section="metrics">Metrics</a>
    <a href="#residents" data-section="residents">Residents</a>
    <a href="#automations" data-section="automations">Automations</a>
    <a href="#adjudication" data-section="adjudication">Adjudication</a>
  </nav>

  <main id="main">
    <!-- Overview (increment 1) -->
    <section class="section" data-pane="overview">
      <div class="eyebrow">Resident Fleet <span class="src-badge" id="resSrc"></span></div>
      <div class="residents" id="residents"></div>
      <div class="attn-band" id="attn" hidden></div>
      <div class="grid" id="stats" style="margin-bottom:var(--space-7)"></div>

      <section class="panel">
        <div class="panel-head">
          <h2>Pulse</h2><span class="who" id="pulseWho">—</span>
          <span class="spring"></span>
          <span class="verdict" id="pulseVerdict"><span class="pip"></span><span>—</span></span>
          <span class="fresh" id="pulseFresh"></span>
        </div>
        <div class="split-wide" style="gap:var(--space-7);align-items:center" id="pulseMain">
          <div>
            <div class="risk-label"><span class="k">Risk</span><span class="v" id="riskVal">—</span></div>
            <div class="track"><div class="fill" id="riskFill" style="width:0%"></div></div>
            <div class="ticks">
              <span style="left:35%">approve</span><span style="left:60%">proceed</span><span style="left:70%">pause</span>
            </div>
          </div>
          <div class="eisv" id="eisv"></div>
        </div>
      </section>
    </section>

    <!-- Agents (increment 2) -->
    <section class="section" data-pane="agents" hidden>
      <h2 class="section-title">Agents</h2>
      <div id="ag-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>

    <!-- Discoveries (increment 3) -->
    <section class="section" data-pane="discoveries" hidden>
      <h2 class="section-title">Discoveries</h2>
      <div id="dsc-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>

    <!-- Dialectic (increment 4) -->
    <section class="section" data-pane="dialectic" hidden>
      <h2 class="section-title">Dialectic</h2>
      <div id="dlc-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>

    <!-- Activity (increment 5) -->
    <section class="section" data-pane="activity" hidden>
      <h2 class="section-title">Activity</h2>
      <div id="act-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>

    <!-- Sections built in later increments -->
    <section class="section" data-pane="eisv" hidden>
      <h2 class="section-title">EISV</h2>
      <div id="eisv-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>
    <section class="section" data-pane="research" hidden>
      <h2 class="section-title">Research</h2>
      <div id="research-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>
    <section class="section" data-pane="metrics" hidden>
      <h2 class="section-title">Metrics</h2>
      <div id="met-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>
    <section class="section" data-pane="residents" hidden>
      <h2 class="section-title">Residents</h2>
      <div id="res-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>

    <section class="section" data-pane="automations" hidden>
      <h2 class="section-title">Automations</h2>
      <div id="auto-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>

    <section class="section" data-pane="adjudication" hidden>
      <div id="adj-mount"><div class="loading-skeleton"><div class="skeleton" style="width:35%"></div><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:80%"></div></div></div>
    </section>
  </main>

  <p class="footnote" id="foot"></p>
</div>

<script src="./snapshot.js"></script>
<script src="./data.js"></script>
<script src="./ws.js"></script>
<script src="./sections/landing.js"></script>
<script src="./sections/agents.js"></script>
<script src="./sections/discoveries.js"></script>
<script src="./sections/dialectic.js"></script>
<script src="./sections/activity.js"></script>
<script src="./sections/eisv.js"></script>
<script src="./sections/research.js"></script>
<script src="./sections/metrics.js"></script>
<script src="./sections/residents.js"></script>
<script src="./sections/automations.js"></script>
<script src="./sections/adjudication.js"></script>
<script>
// theme toggle
const themeBtn = document.getElementById("themeBtn");
const qp = new URLSearchParams(location.search).get("theme");
if (qp === "ink" || qp === "paper") document.documentElement.setAttribute("data-theme", qp);
function syncThemeLabel() {
  themeBtn.textContent = document.documentElement.getAttribute("data-theme") === "ink" ? "◑ paper" : "◐ ink";
}
syncThemeLabel();
themeBtn.onclick = () => {
  const ink = document.documentElement.getAttribute("data-theme") === "ink";
  document.documentElement.setAttribute("data-theme", ink ? "paper" : "ink");
  syncThemeLabel();
  if (window.EISV && window.EISV.retheme) window.EISV.retheme();
  if (window.Metrics && window.Metrics.retheme) window.Metrics.retheme();
};

// section switch
const nav = document.getElementById("nav");
function activateSection(id, updateHash = false) {
  const link = nav.querySelector(`a[data-section="${id}"]`);
  if (!link) return false;
  nav.querySelectorAll("a").forEach((x) => x.classList.toggle("active", x === link));
  document.querySelectorAll("[data-pane]").forEach((p) => { p.hidden = p.dataset.pane !== id; });
  activeSection = id;
  lazyLoad(id);
  updateLivePill();
  if (updateHash && location.hash !== "#" + id) history.pushState(null, "", "#" + id);
  return true;
}
nav.addEventListener("click", (e) => {
  const a = e.target.closest("a[data-section]");
  if (!a) return;
  e.preventDefault();
  activateSection(a.dataset.section, true);
});
window.addEventListener("hashchange", () => {
  const id = (location.hash || "").replace("#", "");
  if (id) activateSection(id, false);
});

const loaded = {};
function lazyLoad(id) {
  if (loaded[id]) return;
  if (id === "agents" && window.Agents) { loaded[id] = true; window.Agents.load(); }
  if (id === "discoveries" && window.Discoveries) { loaded[id] = true; window.Discoveries.load(); }
  if (id === "dialectic" && window.Dialectic) { loaded[id] = true; window.Dialectic.load(); }
  if (id === "activity" && window.Activity) { loaded[id] = true; window.Activity.load(); }
  if (id === "eisv" && window.EISV) { loaded[id] = true; window.EISV.load(); }
  if (id === "research" && window.Research) { loaded[id] = true; window.Research.load(); }
  if (id === "metrics" && window.Metrics) { loaded[id] = true; window.Metrics.load(); }
  if (id === "residents" && window.Residents) { loaded[id] = true; window.Residents.load(); }
  if (id === "automations" && window.Automations) { loaded[id] = true; window.Automations.load(); }
  if (id === "adjudication" && window.Adjudication) { loaded[id] = true; window.Adjudication.load(); }
}

// ── auto-refresh: keep the monitor views live ──────────────────────────────
// Explore views (agents/discoveries/dialectic) have filters/inputs and stay
// manual; the monitor views refresh on a tick. Refresh pauses while the tab is
// hidden or an input is focused, and fires immediately on tab re-focus.
let activeSection = "overview";
const REFRESH_MS = 10000;       // light monitor refresh
const STATS_REFRESH_MS = 30000; // heavy headline batch (7 tools) — gentler cadence
const RELOAD = {
  overview: () => window.Landing && window.Landing.refresh(),
  activity: () => window.Activity && window.Activity.load(),
  residents: () => window.Residents && window.Residents.load(),
  eisv: () => window.EISV && window.EISV.load(),
  // Automations and Metrics are NOT auto-refreshed: Automations is a filter/
  // search registry whose census snapshot changes rarely, and Metrics is
  // Chronicler's DAILY scrape — a 10s tick is pointless and would rebuild the
  // picker (closing an open dropdown) for no fresh data. Both load on nav and
  // have a manual refresh.
};
const livePill = document.getElementById("livePill");
const liveText = document.getElementById("liveText");
function isAutoSection(id) { return Object.prototype.hasOwnProperty.call(RELOAD, id); }
function isTyping() {
  const el = document.activeElement;
  return el && ["INPUT", "SELECT", "TEXTAREA"].includes(el.tagName);
}
let wsStatus = "closed";
function updateLivePill() {
  const auto = isAutoSection(activeSection);
  livePill.classList.toggle("paused", !auto);
  if (!auto) { liveText.textContent = "manual"; livePill.title = "This view is manual — switch to a monitor view for live updates"; return; }
  if (wsStatus === "open") { liveText.textContent = "streaming"; livePill.title = "Live event stream (/ws/eisv)"; }
  else { liveText.textContent = "live"; livePill.title = "Auto-refreshing every 10s (stream reconnecting)"; }
}
function refreshActive() {
  if (document.hidden || isTyping() || !isAutoSection(activeSection)) return;
  const fn = RELOAD[activeSection];
  if (fn) fn();
}
// Polling fallback — only fires when the stream is NOT connected.
function refreshTick() { if (wsStatus !== "open") refreshActive(); }
setInterval(refreshTick, REFRESH_MS);
// Heavier headline batch on a gentler cadence, only while watching the Overview.
setInterval(() => {
  if (document.hidden || isTyping() || activeSection !== "overview") return;
  if (window.Landing && window.Landing.refreshStats) window.Landing.refreshStats();
}, STATS_REFRESH_MS);
document.addEventListener("visibilitychange", () => { if (!document.hidden) refreshActive(); });

// Live event stream. A section may register a direct apply that patches its
// view straight from the pushed event payload (true diff-push, instant). If no
// apply handles the event, we fall back to the doorbell: a debounced refresh of
// the active monitor view through the normal render path. Polling is the last
// resort (only when the stream is down).
const APPLY = {
  eisv: (msg) => window.EISV && window.EISV.applyEvent && window.EISV.applyEvent(msg),
  overview: (msg) => window.Landing && window.Landing.applyEvent && window.Landing.applyEvent(msg),
};
// Silence ticker — re-render the Overview residents strip from its in-memory
// model so "ran Xago" accrues during quiet periods (no network). Visibility-
// gated; only matters while watching the Overview.
setInterval(() => {
  if (document.hidden || activeSection !== "overview") return;
  if (window.Landing && window.Landing.tickSilence) window.Landing.tickSilence();
}, 5000);
// Badge notifications fire regardless of the active section (and while hidden),
// so an explore pane can show "N new since you loaded" without auto-refetching.
const NOTIFY = {
  knowledge_write: () => window.Discoveries && window.Discoveries.notifyNew && window.Discoveries.notifyNew(),
};
let wsDebounce = null;
function onWsEvent(msg) {
  if (msg && NOTIFY[msg.type]) NOTIFY[msg.type]();
  if (document.hidden || isTyping() || !isAutoSection(activeSection)) return;
  const apply = APPLY[activeSection];
  if (apply && apply(msg)) return; // handled live — no refetch
  if (wsDebounce) return;
  wsDebounce = setTimeout(() => { wsDebounce = null; refreshActive(); }, 1500);
}
function onWsStatus(s) { wsStatus = s; updateLivePill(); }
if (window.GovSocket) window.GovSocket.make(onWsEvent, onWsStatus);

// boot
window.Landing.render();
updateLivePill();
// (hashchange routing is handled by the activateSection listener above, which
// supersedes the earlier nav-click-reuse approach — in-page links like the
// Overview Automations card and back/forward both route through it.)

(function openFromHash() {
  const id = (location.hash || "").replace("#", "");
  if (id) activateSection(id, false);
})();
</script>
</body>
</html>
